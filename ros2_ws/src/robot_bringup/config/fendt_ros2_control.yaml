controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    fendt_ackermann_controller:
      type: fendt_ackermann_controller/FendtAckermannController

fendt_ackermann_controller:
  ros__parameters:
    cmd_vel_topic: /cmd_vel_safe
    front_left_steer_joint: front_left_wheel_steer_joint
    front_right_steer_joint: front_right_wheel_steer_joint
    rear_left_wheel_joint: rear_left_wheel_joint
    rear_right_wheel_joint: rear_right_wheel_joint
    wheelbase: 2.37
    traction_track_width: 1.66
    steering_track_width: 1.66
    rear_wheel_radius: 0.78
    max_steering_angle: 0.7853981634
    cmd_vel_timeout: 0.5
    steering_rate_limit: 0.2617993878
    linear_deadband: 0.02
    angular_deadband: 0.02
